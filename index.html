<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>부모님 감사합니다</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Jua', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* 블러 배경 — 같은 사진을 어둡게+흐리게 */
    .hero-bg {
      position: absolute;
      inset: -30px;
      background-image: url("Image/Home/ece0f87e-f1f7-44ff-89b3-8ebc9d50865e.png");
      background-size: cover;
      background-position: center;
      filter: blur(18px) brightness(0.55);
      z-index: 0;
    }

    /* 원본 사진은 잘리지 않게 contain */
    .hero-img {
      position: relative;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      z-index: 1;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.05) 0%,
        transparent 25%,
        transparent 48%,
        rgba(0,0,0,0.45) 78%,
        rgba(0,0,0,0.70) 100%
      );
    }

    /* ── Floating petals ── */
    .petals-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 3;
    }

    .fp {
      position: absolute;
      top: -20px;
      border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
      opacity: 0;
      animation: floatDown linear infinite;
    }

    @keyframes floatDown {
      0%   { opacity: 0;   transform: translateY(0)     rotate(0deg); }
      8%   { opacity: 0.7; }
      90%  { opacity: 0.4; }
      100% { opacity: 0;   transform: translateY(108vh) rotate(540deg); }
    }

    /* ── Bottom text ── */
    .text-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 28px 50px;
      text-align: center;
      color: white;
      pointer-events: none;
      z-index: 4;
    }

    .carnation-svg-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
      animation: riseUp 0.9s ease-out both;
    }

    .carnation-svg-wrap svg {
      animation: gentleSway 5s ease-in-out 1s infinite;
      transform-origin: 50% 88%;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    }

    @keyframes gentleSway {
      0%, 100% { transform: rotate(-5deg); }
      50%       { transform: rotate(5deg); }
    }

    .main-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 2px 14px rgba(0,0,0,0.45);
      margin-bottom: 8px;
      animation: riseUp 0.9s ease-out 0.15s both;
    }

    .date-text {
      font-size: 13px;
      opacity: 0.85;
      letter-spacing: 2px;
      margin-bottom: 26px;
      animation: riseUp 0.9s ease-out 0.3s both;
    }

    .tap-btn {
      display: inline-block;
      padding: 13px 38px;
      border: 1.5px solid rgba(255,255,255,0.7);
      border-radius: 50px;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 15px;
      letter-spacing: 0.5px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      text-decoration: none;
      pointer-events: all;
      animation: riseUp 0.9s ease-out 0.45s both;
    }

    @keyframes riseUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-bg"></div>
    <img class="hero-img" src="Image/Home/ece0f87e-f1f7-44ff-89b3-8ebc9d50865e.png" alt="가족사진">
    <div class="overlay"></div>
    <div class="petals-bg" id="petalsBg"></div>

    <div class="text-bottom">
      <!-- SVG Carnation -->
      <div class="carnation-svg-wrap">
        <svg width="118" height="152" viewBox="0 0 118 152" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="fc">
              <circle cx="59" cy="59" r="54"/>
            </clipPath>
          </defs>

          <!-- Stem + leaf (behind flower) -->
          <path d="M59 112 Q57 131 55 149" stroke="#4a7c59" stroke-width="4.5" fill="none" stroke-linecap="round"/>
          <path d="M57 137 Q44 129 42 118 Q53 128 57 137Z" fill="#5a8a6a"/>

          <!-- Clipped petal rings -->
          <g clip-path="url(#fc)">
            <!-- Outer ring: 12 petals, 30° -->
            <ellipse cx="59" cy="31" rx="11" ry="28" fill="#b02848" opacity="0.78" transform="rotate(0   59 59)"/>
            <ellipse cx="59" cy="31" rx="11" ry="28" fill="#c03050" opacity="0.78" transform="rotate(30  59 59)"/>
            <ellipse cx="59" cy="31" rx="11" ry="28" fill="#b02848" opacity="0.78" transform="rotate(60  59 59)"/>
            <ellipse cx="59" cy="31" rx="11" ry="28" fill="#c03050" opacity="0.78" transform="rotate(90  59 59)"/>
            <ellipse cx="59" cy="31" rx="11" ry="28" fill="#b02848" opacity="0.78" transform="rotate(120 59 59)"/>
            <ellipse cx="59" cy="31" rx="11" ry="28" fill="#c03050" opacity="0.78" transform="rotate(150 59 59)"/>
            <ellipse cx="59" cy="31" rx="11" ry="28" fill="#b02848" opacity="0.78" transform="rotate(180 59 59)"/>
            <ellipse cx="59" cy="31" rx="11" ry="28" fill="#c03050" opacity="0.78" transform="rotate(210 59 59)"/>
            <ellipse cx="59" cy="31" rx="11" ry="28" fill="#b02848" opacity="0.78" transform="rotate(240 59 59)"/>
            <ellipse cx="59" cy="31" rx="11" ry="28" fill="#c03050" opacity="0.78" transform="rotate(270 59 59)"/>
            <ellipse cx="59" cy="31" rx="11" ry="28" fill="#b02848" opacity="0.78" transform="rotate(300 59 59)"/>
            <ellipse cx="59" cy="31" rx="11" ry="28" fill="#c03050" opacity="0.78" transform="rotate(330 59 59)"/>
            <!-- Middle ring: 10 petals, 36° offset 15° -->
            <ellipse cx="59" cy="36" rx="9"  ry="23" fill="#d63a5f" opacity="0.86" transform="rotate(15  59 59)"/>
            <ellipse cx="59" cy="36" rx="9"  ry="23" fill="#cc3457" opacity="0.86" transform="rotate(51  59 59)"/>
            <ellipse cx="59" cy="36" rx="9"  ry="23" fill="#d63a5f" opacity="0.86" transform="rotate(87  59 59)"/>
            <ellipse cx="59" cy="36" rx="9"  ry="23" fill="#cc3457" opacity="0.86" transform="rotate(123 59 59)"/>
            <ellipse cx="59" cy="36" rx="9"  ry="23" fill="#d63a5f" opacity="0.86" transform="rotate(159 59 59)"/>
            <ellipse cx="59" cy="36" rx="9"  ry="23" fill="#cc3457" opacity="0.86" transform="rotate(195 59 59)"/>
            <ellipse cx="59" cy="36" rx="9"  ry="23" fill="#d63a5f" opacity="0.86" transform="rotate(231 59 59)"/>
            <ellipse cx="59" cy="36" rx="9"  ry="23" fill="#cc3457" opacity="0.86" transform="rotate(267 59 59)"/>
            <ellipse cx="59" cy="36" rx="9"  ry="23" fill="#d63a5f" opacity="0.86" transform="rotate(303 59 59)"/>
            <ellipse cx="59" cy="36" rx="9"  ry="23" fill="#cc3457" opacity="0.86" transform="rotate(339 59 59)"/>
            <!-- Inner ring: 8 petals, 45° offset 7.5° -->
            <ellipse cx="59" cy="42" rx="7.5" ry="17" fill="#e8536a" opacity="0.92" transform="rotate(7.5   59 59)"/>
            <ellipse cx="59" cy="42" rx="7.5" ry="17" fill="#de4d63" opacity="0.92" transform="rotate(52.5  59 59)"/>
            <ellipse cx="59" cy="42" rx="7.5" ry="17" fill="#e8536a" opacity="0.92" transform="rotate(97.5  59 59)"/>
            <ellipse cx="59" cy="42" rx="7.5" ry="17" fill="#de4d63" opacity="0.92" transform="rotate(142.5 59 59)"/>
            <ellipse cx="59" cy="42" rx="7.5" ry="17" fill="#e8536a" opacity="0.92" transform="rotate(187.5 59 59)"/>
            <ellipse cx="59" cy="42" rx="7.5" ry="17" fill="#de4d63" opacity="0.92" transform="rotate(232.5 59 59)"/>
            <ellipse cx="59" cy="42" rx="7.5" ry="17" fill="#e8536a" opacity="0.92" transform="rotate(277.5 59 59)"/>
            <ellipse cx="59" cy="42" rx="7.5" ry="17" fill="#de4d63" opacity="0.92" transform="rotate(322.5 59 59)"/>
            <!-- Innermost: 6 petals -->
            <ellipse cx="59" cy="48" rx="6"  ry="12" fill="#ff6b85" opacity="0.97" transform="rotate(0   59 59)"/>
            <ellipse cx="59" cy="48" rx="6"  ry="12" fill="#ff5577" opacity="0.97" transform="rotate(60  59 59)"/>
            <ellipse cx="59" cy="48" rx="6"  ry="12" fill="#ff6b85" opacity="0.97" transform="rotate(120 59 59)"/>
            <ellipse cx="59" cy="48" rx="6"  ry="12" fill="#ff5577" opacity="0.97" transform="rotate(180 59 59)"/>
            <ellipse cx="59" cy="48" rx="6"  ry="12" fill="#ff6b85" opacity="0.97" transform="rotate(240 59 59)"/>
            <ellipse cx="59" cy="48" rx="6"  ry="12" fill="#ff5577" opacity="0.97" transform="rotate(300 59 59)"/>
          </g>

          <!-- Calyx covers bottom of flower -->
          <ellipse cx="59" cy="104" rx="18" ry="13" fill="#4a7c59"/>
          <ellipse cx="59" cy="100" rx="14" ry="9"  fill="#5a8a6a"/>

          <!-- Center dot (not clipped) -->
          <circle cx="59" cy="59" r="14" fill="#ff8fa3"/>
          <circle cx="59" cy="59" r="8"  fill="#ffb3c1"/>
          <circle cx="59" cy="59" r="4"  fill="#ffe4ec"/>
        </svg>
      </div>

      <div class="main-title">부모님 감사합니다</div>
      <div class="date-text">2026년 어버이날</div>
      <a class="tap-btn" href="carnation.html">추억 보기 →</a>
    </div>
  </div>

  <script>
    const bg = document.getElementById('petalsBg');
    const colors = ['#e8536a','#d63a5f','#ff8fa3','#ffb3c1','#ff6b85','#ffc8d2'];
    for (let i = 0; i < 14; i++) {
      const el = document.createElement('div');
      el.className = 'fp';
      const s = 8 + Math.random() * 10;
      el.style.cssText = `
        left:${Math.random()*100}%;
        width:${s}px; height:${s*1.35}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${5+Math.random()*7}s;
        animation-delay:${Math.random()*10}s;
      `;
      bg.appendChild(el);
    }
  </script>
</body>
</html>
